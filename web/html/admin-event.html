<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이벤트 좌석 선택 사용자</title>
  <style>
    :root {
      --bg: #f2f4f8;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --danger: #b91c1c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #e0f2fe, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
    }
    .card {
      width: min(900px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 30px rgba(15, 23, 42, 0.06);
      display: grid;
      gap: 12px;
    }
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .back { text-decoration: none; color: #0f766e; font-weight: 700; }
    .auth-area { display: flex; gap: 8px; align-items: center; }
    .auth-link, .auth-btn {
      border: 1px solid var(--line);
      padding: 6px 10px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.9rem;
      background: white;
      cursor: pointer;
    }
    .auth-name { font-weight: 700; }
    h1 { font-size: 1.3rem; }
    #message { min-height: 20px; color: var(--danger); font-size: 0.9rem; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.92rem;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 10px 8px;
    }
    th { color: var(--muted); font-weight: 700; }
    .release-btn {
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 6px 10px;
      color: #b91c1c;
      background: #fff1f2;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
    }
    .empty {
      border: 1px dashed var(--line);
      border-radius: 10px;
      padding: 14px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="top">
      <a class="back" href="/">← 목록으로</a>
      <div id="authArea" class="auth-area"></div>
    </div>

    <h1 id="title">이벤트 좌석 선택 사용자</h1>
    <p id="message"></p>
    <div id="content"></div>
  </main>

  <script src="/auth.js"></script>
  <script>
    const titleEl = document.getElementById('title');
    const messageEl = document.getElementById('message');
    const contentEl = document.getElementById('content');

    const eventId = Number(new URLSearchParams(window.location.search).get('eventId'));

    function renderTable(seatOwners, token) {
      if (!seatOwners.length) {
        contentEl.innerHTML = '<div class="empty">아직 선택된 좌석이 없습니다.</div>';
        return;
      }

      const rows = seatOwners.map((item) => `
        <tr>
          <td>${item.seat_id}</td>
          <td>${item.username}</td>
          <td>${item.name}</td>
          <td>${item.phone}</td>
          <td>${item.is_admin ? '관리자' : '일반'}</td>
          <td><button class="release-btn" data-seat-id="${item.seat_id}">좌석 해제</button></td>
        </tr>
      `).join('');

      contentEl.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>좌석</th>
              <th>아이디</th>
              <th>이름</th>
              <th>핸드폰</th>
              <th>권한</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      `;

      contentEl.querySelectorAll('.release-btn').forEach((button) => {
        button.addEventListener('click', async () => {
          const seatId = button.getAttribute('data-seat-id');
          if (!seatId) return;

          const ok = window.confirm(`${seatId} 좌석 선택을 해제할까요?`);
          if (!ok) return;

          const response = await fetch(`/api/events/${eventId}/seats/${seatId}`, {
            method: 'DELETE',
            headers: { Authorization: `Bearer ${token}` },
          });
          const body = await response.json();
          if (!response.ok) {
            messageEl.textContent = body.detail || '좌석 해제에 실패했습니다.';
            return;
          }

          messageEl.textContent = body.message || '좌석이 해제되었습니다.';
          await loadSeatOwners(token);
        });
      });
    }

    async function loadSeatOwners(token) {
      const response = await fetch(`/api/events/${eventId}/seat-owners`, {
        headers: { Authorization: `Bearer ${token}` },
      });
      const body = await response.json();

      if (!response.ok) {
        messageEl.textContent = body.detail || '좌석 선택 사용자 정보를 불러오지 못했습니다.';
        return;
      }

      titleEl.textContent = `${body.event.name} 좌석 선택 사용자 목록`;
      renderTable(body.seat_owners || [], token);
    }

    async function init() {
      await TicketingAuth.renderAuthArea('authArea');
      const me = await TicketingAuth.fetchMe();
      if (!me || !me.is_admin) {
        messageEl.textContent = '관리자만 접근할 수 있습니다.';
        contentEl.innerHTML = '';
        return;
      }

      const token = TicketingAuth.getToken();
      await loadSeatOwners(token);
    }

    init();
  </script>
</body>
</html>
