<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입</title>
  <style>
    :root {
      --bg: #f2f4f8;
      --card: #fff;
      --text: #111827;
      --line: #e5e7eb;
      --accent: #0f766e;
      --danger: #b91c1c;
      --success: #065f46;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #e0f2fe, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(460px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      display: grid;
      gap: 12px;
    }
    h1 { font-size: 1.4rem; }
    label { font-size: 0.9rem; display: grid; gap: 6px; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }
    button {
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    .links {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
    }
    .links a { color: #0f766e; text-decoration: none; }
    #message { min-height: 20px; font-size: 0.9rem; color: var(--danger); }
  </style>
</head>
<body>
  <main class="card">
    <h1>회원가입</h1>
    <form id="signupForm">
      <label>아이디<input name="username" minlength="4" required /></label><br />
      <label>비밀번호<input name="password" type="password" minlength="8" required /></label><br />
      <label>이름<input name="name" required /></label><br />
      <label>핸드폰번호<input name="phone" required /></label><br />
      <button type="submit">가입하기</button>
    </form>
    <p id="message"></p>
    <div class="links">
      <a href="/login.html">로그인</a>
      <a href="/">목록으로</a>
    </div>
  </main>

  <script>
    const form = document.getElementById('signupForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.style.color = '#b91c1c';
      message.textContent = '';

      const formData = new FormData(form);
      const payload = {
        username: String(formData.get('username') || '').trim(),
        password: String(formData.get('password') || ''),
        name: String(formData.get('name') || '').trim(),
        phone: String(formData.get('phone') || '').trim(),
      };

      const response = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const body = await response.json();

      if (!response.ok) {
        message.textContent = body.detail || '회원가입에 실패했습니다.';
        return;
      }

      message.style.color = '#065f46';
      message.textContent = `${body.name}님 가입 완료. 로그인 페이지로 이동합니다.`;
      setTimeout(() => {
        window.location.href = '/login.html';
      }, 900);
    });
  </script>
</body>
</html>
