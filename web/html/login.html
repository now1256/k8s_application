<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인</title>
  <style>
    :root {
      --bg: #f2f4f8;
      --card: #fff;
      --text: #111827;
      --line: #e5e7eb;
      --accent: #0f766e;
      --danger: #b91c1c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top right, #e0f2fe, var(--bg) 45%);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(420px, 100%);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      display: grid;
      gap: 12px;
    }
    h1 { font-size: 1.4rem; }
    label { font-size: 0.9rem; display: grid; gap: 6px; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }
    button {
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      padding: 10px;
      font-weight: 700;
      cursor: pointer;
    }
    .links {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
    }
    .links a { color: #0f766e; text-decoration: none; }
    #message { min-height: 20px; font-size: 0.9rem; color: var(--danger); }
  </style>
</head>
<body>
  <main class="card">
    <h1>로그인</h1>
    <form id="loginForm">
      <label>아이디<input name="username" required /></label><br />
      <label>비밀번호<input name="password" type="password" required /></label><br />
      <button type="submit">로그인</button>
    </form>
    <p id="message"></p>
    <div class="links">
      <a href="/signup.html">회원가입</a>
      <a href="/">목록으로</a>
    </div>
  </main>

  <script src="/auth.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.textContent = '';

      const formData = new FormData(form);
      const payload = {
        username: String(formData.get('username') || '').trim(),
        password: String(formData.get('password') || ''),
      };

      const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      const body = await response.json();

      if (!response.ok) {
        message.textContent = body.detail || '로그인에 실패했습니다.';
        return;
      }

      TicketingAuth.setToken(body.access_token);
      window.location.href = '/';
    });
  </script>
</body>
</html>
