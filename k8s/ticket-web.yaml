apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-srv
  template:
    metadata:
      labels:
        app: web-srv
    spec:
      containers:
        - name: web
          image: harbor.team1.local/library/ticket-web:1
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
spec:
  selector:
    app: web-srv
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort