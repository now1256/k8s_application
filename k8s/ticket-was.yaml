apiVersion: apps/v1
kind: Deployment
metadata:
  name: was-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: was-srv
  template:
    metadata:
      labels:
        app: was-srv
    spec:
      containers:
        - name: was
          image: harbor.team1.local/library/ticket-was:1
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: was-secret
---
apiVersion: v1
kind: Service
metadata:
  name: was
spec:
  selector:
    app: was-srv
  ports:
    - port: 8000
      targetPort: 8000
  type: ClusterIP